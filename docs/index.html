<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jade Zhao portfolio landing page redirect.">
  <link rel="icon" href="images/uno1.jpg" type="image/jpeg">
  <link rel="apple-touch-icon" href="images/uno1.jpg">
  <title>Jade Zhao Portfolio</title>
  <style>
    :root {
      --bg: #f8ede3;
      --surface: #fff8f2;
      --ink: #2f1f18;
      --muted: #7d6355;
      --accent: #c96f47;
      --line: rgba(95, 56, 37, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 10% 15%, rgba(201, 111, 71, 0.14), transparent 40%),
        radial-gradient(circle at 90% 5%, rgba(159, 77, 47, 0.12), transparent 35%),
        linear-gradient(160deg, var(--bg) 0%, #fbeee4 48%, #f2e0d0 100%);
      color: var(--ink);
      font-family: "DM Sans", "Segoe UI", Tahoma, sans-serif;
      padding: 1.5rem;
    }

    .card {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 1.6rem;
      box-shadow: 0 20px 40px rgba(47, 31, 24, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    p {
      margin: 0.9rem 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .loader {
      margin-top: 1.1rem;
      height: 6px;
      border-radius: 999px;
      background: rgba(201, 111, 71, 0.16);
      overflow: hidden;
    }

    .loader span {
      display: block;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #d08460, var(--accent));
      animation: slide 1.1s ease-in-out infinite;
    }

    @keyframes slide {
      from { transform: translateX(-120%); }
      to { transform: translateX(320%); }
    }

    a {
      color: var(--accent);
      text-underline-offset: 2px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <h1>Opening Jade Zhao Portfolio</h1>
    <p>You are being redirected to the main site now.</p>
    <div class="loader" aria-hidden="true"><span></span></div>
    <p>If it does not open automatically, use this link: <a id="fallbackLink" href="./site/">Open portfolio</a></p>
  </main>
  <script>
    const currentPath = window.location.pathname;
    const basePath = currentPath.endsWith('/index.html')
      ? currentPath.slice(0, -'index.html'.length)
      : (currentPath.endsWith('/') ? currentPath : `${currentPath}/`);
    const destination = `${basePath}site/`;
    const fallback = document.getElementById('fallbackLink');
    if (fallback) fallback.href = destination;
    window.location.replace(destination);
  </script>
  <noscript>
    <p><a href="./site/">Open portfolio</a></p>
  </noscript>
</body>
</html>
